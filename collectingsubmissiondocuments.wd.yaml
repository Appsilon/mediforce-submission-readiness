name: collecting-submission-documents
namespace: pawel
visibility: private
title: Collecting Submission Documents
description: >
  Multi-stakeholder document collection workflow. Sends coordinated outreach
  emails, tracks submissions via SFTP, and iterates with reminders or fix
  requests until all required documents are received or the campaign is closed.
env: {}
steps:
  - id: provide-mapping
    name: Provide deadlines, owners and other values
    type: creation
    description: >
      Provide a JSON object with all information needed for the document
      collection campaign. Required keys: stakeholders (array of objects with
      name, email, documents, deadline, requirements), sftp_address, and
      campaign_context. Additional keys are passed through to the email drafter.
    params:
      - name: mapping
        type: textarea
        required: true
        description: |
          JSON mapping with stakeholder data. Example: {
            "campaign_context": "Phase III Trial ABC-123 Data Package",
            "sftp_address": "sftp://files.example.com/submissions",
            "stakeholders": [
              {
                "name": "Acme CRO",
                "email": "data@acme.com",
                "documents": ["Protocol Amendment v2", "Safety Report Q1"],
                "deadline": "2026-06-15",
                "requirements": "PDF format, signed by principal investigator"
              }
            ]
          }
    executor: human

  - id: fill-template
    name: Fill email template
    type: creation
    executor: script
    plugin: script-container
    description: Fills email template based on the user provided values.
    agent:
      runtime: javascript
      inlineScript: |-
        import { readFileSync, writeFileSync } from 'fs';

        const input = JSON.parse(readFileSync('/output/input.json', 'utf8'));
        const values = JSON.parse(input.mapping);

        const token = process.env.GITHUB_TOKEN;
        const headers = token ? { Authorization: `token ${token}` } : {};
        const res = await fetch(
          'https://raw.githubusercontent.com/Appsilon/mediforce-submission-readiness/refs/heads/main/email-template.md',
          { headers }
        );
        if (!res.ok) throw new Error(`Template fetch failed: ${res.status}`);

        let md = await res.text();

        for (const [key, val] of Object.entries(values)) {
          md = md.replaceAll(`{${key}}`, String(val));
        }

        function inlineFmt(text) {
          return text
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*([^*]+)\*/g, '<em>$1</em>')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
        }

        function renderTable(tableLines) {
          const rows = tableLines.filter(l => !/^[\|\s:\-]+$/.test(l.trim()));
          let t = '<table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;margin:12px 0">\n';
          for (const row of rows) {
            const cells = row.split('|').slice(1, -1);
            t += '<tr>' + cells.map(c => `<td style="vertical-align:top;padding:8px;border:1px solid #ccc">${inlineFmt(c.trim())}</td>`).join('') + '</tr>\n';
          }
          return t + '</table>';
        }

        const lines = md.split('\n');
        const blocks = [];
        let i = 0;
        while (i < lines.length) {
          const line = lines[i];
          if (line.trim().startsWith('|')) {
            const tbl = [];
            while (i < lines.length && lines[i].trim().startsWith('|')) tbl.push(lines[i++]);
            blocks.push(renderTable(tbl));
          } else if (line.trim() === '') {
            i++;
          } else {
            const para = [];
            while (i < lines.length && lines[i].trim() !== '' && !lines[i].trim().startsWith('|')) para.push(lines[i++]);
            blocks.push(`<p style="margin:0 0 1em 0">${inlineFmt(para.map(l => l.trimEnd()).join('<br>'))}</p>`);
          }
        }

        const html = `<!DOCTYPE html><html><body style="font-family:Arial,sans-serif;font-size:14px;color:#333;max-width:900px;margin:0 auto;padding:20px;line-height:1.5">\n${blocks.join('\n')}\n</body></html>`;

        const stakeholdersEmails =
          (typeof values['stakeholders-emails'] === 'object' && values['stakeholders-emails'] !== null)
            ? values['stakeholders-emails']
            : {};
        const recipientEntries = Object.entries(stakeholdersEmails);
        const recipientEmails = recipientEntries.map(([, email]) => String(email)).join(',');
        const recipientsDisplay = '<ul style="margin:4px 0;padding-left:20px">' +
          recipientEntries.map(([role, email]) => `<li>${role}: ${email}</li>`).join('') +
          '</ul>';

        writeFileSync('/output/result.json', JSON.stringify({
          subject: values.subject ?? 'Document Submission Request',
          body: md,
          html,
          presentation: html,
          recipientEmails,
          recipientsDisplay
        }));

  - id: check-email
    name: Check email
    type: decision
    executor: human
    description: Human verifies if email is rendered correctly, otherwise return to
      step 1 to provide correct values.
    verdicts:
      approve:
        target: send-preview
        label: Approve
        intent: success
      revise:
        target: provide-mapping
        label: Revise
        intent: warning

  - id: send-preview
    name: Send Preview to Workflow Owner
    type: creation
    description: >
      Send the approved email draft to the person who triggered the workflow
      (WORKFLOW_OWNER_EMAIL env var) so they can review it in their inbox before it
      reaches all stakeholders.
    executor: action
    action:
      kind: email
      config:
        to: ${secrets.WORKFLOW_OWNER_EMAIL}
        subject: "[PREVIEW] ${steps.fill-template.subject}"
        body: ${steps.fill-template.body}
        html: ${steps.fill-template.html}
    continueOnError: true

  - id: show-approval-summary
    name: Show Approval Summary
    type: creation
    executor: action
    description: Prepares recipient list and subject for the approval step view.
    action:
      kind: reshape
      config:
        values:
          presentation: '<h3 style="margin:0 0 12px 0">Ready to send</h3><p style="margin:0 0 8px 0"><strong>Subject:</strong> ${steps.fill-template.subject}</p><p style="margin:0 0 4px 0"><strong>Recipients:</strong></p>${steps.fill-template.recipientsDisplay}'
          recipientEmails: ${steps.fill-template.recipientEmails}
          subject: ${steps.fill-template.subject}

  - id: approve-send
    name: Approve Sending to Stakeholders
    type: decision
    description: >
      Check your inbox for the preview email. Decide whether to send it to all
      stakeholders as-is, or abort the campaign.
    verdicts:
      approve:
        target: send-stakeholder-emails
        label: Send to all stakeholders
        intent: success
      abort:
        target: done
        label: Abort
        intent: warning
    executor: human

  - id: send-stakeholder-emails
    name: Send Email to All Stakeholders
    type: creation
    description: >
      Send the approved email to all stakeholder addresses from the mapping. The
      Workflow Owner is added in CC.
    executor: action
    action:
      kind: email
      config:
        to: ${steps.fill-template.recipientEmails}
        cc:
          - ${secrets.WORKFLOW_OWNER_EMAIL}
        subject: ${steps.fill-template.subject}
        body: ${steps.fill-template.body}
        html: ${steps.fill-template.html}

  - id: verify-sftp
    name: Verify SFTP Submissions
    type: creation
    executor: agent
    autonomyLevel: L4
    plugin: claude-code-agent
    env:
      SFTP_IP: "{{SFTP_SHARED_DRIVE_IP}}"
      SFTP_PASSWORD: "{{SFTP_SHARED_DRIVE_PASSWORD}}"
      SFTP_PATH: "{{SFTP_SHARED_DRIVE_PATH}}"
      SFTP_USER: "{{SFTP_SHARED_DRIVE_USER}}"
      ANTHROPIC_AUTH_TOKEN: "{{OPENROUTER_API_KEY}}"
      ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
    description: Connect to the SFTP shared drive and summarize the files found.
    agent:
      model: anthropic/claude-sonnet-4.6
      image: mediforce-golden-image
      timeoutMinutes: 20
      confidenceThreshold: 0.8
      fallbackBehavior: escalate_to_human
      allowedTools:
        - Bash
        - Read
        - Write
      prompt: |
        Connect to the SFTP shared drive and summarize its contents.

        Credentials are available as environment variables:
        - SFTP_IP — server IP address
        - SFTP_USER — username
        - SFTP_PASSWORD — password
        - SFTP_PATH — folder path to inspect

        Steps:
        1. Install paramiko if not already available:
           pip3 install paramiko --break-system-packages --quiet
        2. Use a Python script (via Bash) to connect to the SFTP server on port 22
           using the credentials above. Disable host-key checking for
           non-interactive use. List all files in SFTP_PATH (no recursion).
        3. Download each file to /tmp/sftp_files/ and read its content.
           Write a 1-2 sentence summary of what the file contains.
        4. Produce the final output JSON at /output/result.json:
           {
             "verificationReport": "<summary>",
             "pendingStakeholders": []
           }
           Where verificationReport is:
           - "The folder is empty — no files have been uploaded yet." if no files found.
           - Otherwise: one entry per file with its filename and a 1-2 sentence
             content summary.

  - id: check-decision
    name: Check Files Report - Decide Next Action
    type: decision
    description: >
      Review the SFTP report above, pick the date/time for the next scheduled
      action, then choose what to do next.
    params:
      - name: scheduled_action_date
        type: datetime
        required: true
        description: >
          Date and time for the next scheduled action. The action triggers at
          the first heartbeat tick after this time (within 15 minutes on
          staging/prod; call /api/cron/heartbeat manually in local dev).
          Time is interpreted in your local browser timezone.
    verdicts:
      wait:
        target: wait-for-recheck
        label: Wait, then re-check SFTP
        intent: neutral
      remind:
        target: wait-for-reminder
        label: Wait, then send reminder
        intent: neutral
      request-fixes:
        target: wait-for-fixes
        label: Wait, then ask for fixes
        intent: warning
        requiresComment: true
      complete:
        target: done
        label: Finalize — collection complete
        intent: success
    executor: human

  - id: remind-draft
    name: Draft Reminder Email
    type: creation
    description: Draft a polite reminder email to stakeholders.
    executor: agent
    autonomyLevel: L1
    plugin: claude-code-agent
    env:
      ANTHROPIC_AUTH_TOKEN: "{{OPENROUTER_API_KEY}}"
      ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
    agent:
      model: anthropic/claude-sonnet-4.6
      image: mediforce-golden-image
      confidenceThreshold: 0.7
      fallbackBehavior: escalate_to_human
      timeoutMinutes: 10
      prompt: |
        Draft a polite reminder email to stakeholders who have not yet submitted
        their required documents.

        Context available in /output/input.json:
        - steps.verify-sftp.verificationReport — summary of what has and hasn't been submitted
        - steps.provide-mapping.mapping — original stakeholder mapping with deadlines

        Parse /output/input.json, read the verification report and mapping, then
        compose a professional reminder email referencing the specific missing
        documents and original deadlines.

        Write the result to /output/result.json:
        {
          "reminderSubject": "<email subject>",
          "reminderBody": "<plain text email body>",
          "reminderRecipients": ["<email addresses of stakeholders with missing docs>"]
        }

  - id: send-reminder
    name: Send Reminder Email
    type: creation
    description: Send the reminder email to pending stakeholders. Workflow Owner is CC'd.
    executor: action
    action:
      kind: email
      config:
        to: ${steps.remind-draft.reminderRecipients}
        cc:
          - ${secrets.WORKFLOW_OWNER_EMAIL}
        subject: ${steps.remind-draft.reminderSubject}
        body: ${steps.remind-draft.reminderBody}
    continueOnError: true

  - id: fix-email-draft
    name: Draft Fix / Clarification Request
    type: creation
    description: Draft an email asking stakeholders to correct or clarify their submissions.
    executor: agent
    autonomyLevel: L1
    plugin: claude-code-agent
    env:
      ANTHROPIC_AUTH_TOKEN: "{{OPENROUTER_API_KEY}}"
      ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
    agent:
      model: anthropic/claude-sonnet-4.6
      image: mediforce-golden-image
      confidenceThreshold: 0.7
      fallbackBehavior: escalate_to_human
      timeoutMinutes: 10
      prompt: |
        Draft a professional email asking specific stakeholders to correct errors
        or provide clarifications about their submitted documents.

        Context available in /output/input.json:
        - steps.verify-sftp.verificationReport — details of what was wrong or missing
        - steps.check-decision.comment — the reviewer's note on what needs fixing
        - steps.provide-mapping.mapping — original stakeholder mapping

        Parse /output/input.json, read the verification report, the reviewer's
        comment, and the mapping, then compose a targeted email explaining clearly
        what needs to be corrected and how.

        Write the result to /output/result.json:
        {
          "fixEmailSubject": "<email subject>",
          "fixEmailBody": "<plain text email body>",
          "fixEmailRecipients": ["<email addresses of affected stakeholders>"]
        }

  - id: send-fix-email
    name: Send Fix / Clarification Request
    type: creation
    description: Send the fix or clarification request to relevant stakeholders.
      Workflow Owner is CC'd.
    executor: action
    action:
      kind: email
      config:
        to: ${steps.fix-email-draft.fixEmailRecipients}
        cc:
          - ${secrets.WORKFLOW_OWNER_EMAIL}
        subject: ${steps.fix-email-draft.fixEmailSubject}
        body: ${steps.fix-email-draft.fixEmailBody}
    continueOnError: true

  - id: wait-for-recheck
    name: Wait Until Scheduled Time
    type: creation
    description: Pause until the scheduled date, then re-check SFTP submissions.
    executor: action
    action:
      kind: wait
      config:
        deadline: ${steps.check-decision.scheduled_action_date}

  - id: wait-for-reminder
    name: Wait Until Scheduled Time
    type: creation
    description: Pause until the scheduled date, then send the reminder email.
    executor: action
    action:
      kind: wait
      config:
        deadline: ${steps.check-decision.scheduled_action_date}

  - id: wait-for-fixes
    name: Wait Until Scheduled Time
    type: creation
    description: Pause until the scheduled date, then send the fix request email.
    executor: action
    action:
      kind: wait
      config:
        deadline: ${steps.check-decision.scheduled_action_date}

  - id: done
    name: Done
    type: terminal
    description: Document collection workflow completed successfully.
    executor: human

transitions:
  # email preparation spine
  - from: provide-mapping
    to: fill-template
  - from: fill-template
    to: check-email
  - from: check-email
    to: send-preview
    when: "verdict == \"approve\""
  - from: check-email
    to: provide-mapping
    when: "verdict == \"revise\""
  - from: send-preview
    to: show-approval-summary
  - from: show-approval-summary
    to: approve-send
  - from: approve-send
    to: send-stakeholder-emails
    when: "verdict == \"approve\""
  - from: approve-send
    to: done
    when: "verdict == \"abort\""
  # SFTP loop entry
  - from: send-stakeholder-emails
    to: verify-sftp
  - from: verify-sftp
    to: check-decision
  # check-decision branches
  - from: check-decision
    to: wait-for-recheck
    when: "verdict == \"wait\""
  - from: check-decision
    to: wait-for-reminder
    when: "verdict == \"remind\""
  - from: check-decision
    to: wait-for-fixes
    when: "verdict == \"request-fixes\""
  - from: check-decision
    to: done
    when: "verdict == \"complete\""
  # wait → next step for each branch
  - from: wait-for-recheck
    to: verify-sftp
  - from: wait-for-reminder
    to: remind-draft
  - from: wait-for-fixes
    to: fix-email-draft
  # post-action loops back into SFTP check
  - from: remind-draft
    to: send-reminder
  - from: send-reminder
    to: verify-sftp
  - from: fix-email-draft
    to: send-fix-email
  - from: send-fix-email
    to: verify-sftp

triggers:
  - type: manual
    name: manual
